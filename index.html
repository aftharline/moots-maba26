<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#060d1a">
    <title>MABA 26 UNESA</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        a, button { touch-action: manipulation; }

        :root {
            --navy-deep: #060d1a;
            --navy-dark: #0a1628;
            --navy-mid: #122040;
            --navy-light: #1a2d52;
            --gold: #d4a843;
            --gold-light: #f0c75e;
            --gold-dark: #b08a2a;
            --gold-glow: rgba(212,168,67,0.25);
            --gold-subtle: rgba(212,168,67,0.06);
            --text-dim: rgba(255,255,255,0.55);
            --text-muted: rgba(255,255,255,0.3);
            --input-bg: rgba(255,255,255,0.04);
            --input-border: rgba(255,255,255,0.08);
            --top-pad: max(12px, env(safe-area-inset-top));
            --bot-pad: max(12px, env(safe-area-inset-bottom));
            --side-pad: max(14px, env(safe-area-inset-left));
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--navy-deep);
            height: 100dvh;
            height: 100vh;
            display: flex;
            flex-direction: column;
            margin: 0;
            overflow: hidden;
            color: #fff;
            position: relative;
        }

        /* ====== BACKGROUND ====== */
        .bg-layer { position: fixed; inset: 0; pointer-events: none; }
        .bg-gradient {
            z-index: 0;
            background:
                radial-gradient(ellipse 100% 55% at 20% 0%, rgba(18,32,64,0.95), transparent 65%),
                radial-gradient(ellipse 60% 45% at 90% 90%, rgba(26,45,82,0.35), transparent 55%),
                radial-gradient(circle at 50% 50%, rgba(10,22,40,1), var(--navy-deep));
        }
        .bg-grid {
            z-index: 1;
            background-image:
                linear-gradient(rgba(212,168,67,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(212,168,67,0.02) 1px, transparent 1px);
            background-size: 56px 56px;
            mask-image: radial-gradient(ellipse 80% 60% at 50% 30%, black, transparent);
            -webkit-mask-image: radial-gradient(ellipse 80% 60% at 50% 30%, black, transparent);
        }
        .bg-orb {
            position: fixed; z-index: 1; border-radius: 50%;
            filter: blur(90px); pointer-events: none;
            animation: orbFloat 14s ease-in-out infinite alternate;
        }
        .bg-orb--1 { width: 260px; height: 260px; top: -80px; right: -60px; background: rgba(212,168,67,0.05); }
        .bg-orb--2 { width: 200px; height: 200px; bottom: -50px; left: -40px; background: rgba(18,32,64,0.6); animation-delay: -7s; }
        @keyframes orbFloat {
            0% { transform: translate(0,0) scale(1); }
            100% { transform: translate(25px,18px) scale(1.1); }
        }
        #particles { position: fixed; inset: 0; z-index: 2; pointer-events: none; }

        /* ====== APP SHELL ====== */
        .app {
            position: relative; z-index: 10;
            display: flex; flex-direction: column;
            height: 100%;
            flex: 1;
            min-height: 0;
        }

        /* ====== TOP SECTION (form area) ====== */
        .top-section {
            flex-shrink: 0;
            padding: var(--top-pad) var(--side-pad) 0;
        }
        .header { text-align: center; padding-bottom: 14px; }

        .header-row {
            display: flex; align-items: center; justify-content: center; gap: 14px;
        }
        .badge {
            width: 42px; height: 42px; border-radius: 12px; flex-shrink: 0;
            background: linear-gradient(135deg, var(--gold-dark), var(--gold-light), var(--gold));
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; font-weight: 800; color: var(--navy-deep);
            box-shadow: 0 4px 20px var(--gold-glow), inset 0 1px 0 rgba(255,255,255,0.3);
            position: relative;
            animation: badgePulse 4s ease-in-out infinite;
        }
        .badge::before { content:''; position:absolute; inset:2px; border-radius:10px; border:1px solid rgba(0,0,0,0.08); }
        @keyframes badgePulse {
            0%,100% { box-shadow: 0 4px 20px var(--gold-glow); }
            50% { box-shadow: 0 4px 35px rgba(212,168,67,0.4); }
        }

        .header-text { text-align: left; }
        .header-text h2 {
            font-size: 19px; font-weight: 800; letter-spacing: -0.3px; line-height: 1.2;
            background: linear-gradient(120deg, var(--gold-light) 0%, var(--gold) 40%, var(--gold-dark) 70%, var(--gold-light) 100%);
            background-size: 250% 100%;
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: textShimmer 5s ease-in-out infinite;
        }
        .header-text .subtitle {
            color: var(--text-muted); font-size: 11.5px; margin-top: 2px; font-weight: 400;
        }
        @keyframes textShimmer {
            0%,100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* ====== FORM (inline, compact) ====== */
        .form-row {
            display: flex; gap: 8px; padding: 10px 0 14px;
        }
        .input-group { position: relative; flex: 1; min-width: 0; }
        .input-group input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            padding: 0 12px 0 36px;
            height: 44px;
            border-radius: 12px;
            color: #fff; font-size: 14px; font-family: inherit;
            outline: none; transition: all 0.25s ease;
        }
        .input-group input::placeholder { color: var(--text-muted); font-size: 13px; }
        .input-group input:focus {
            border-color: var(--gold);
            background: rgba(212,168,67,0.04);
            box-shadow: 0 0 0 2px rgba(212,168,67,0.08);
        }
        .input-group:focus-within .icon { color: var(--gold); }
        .icon {
            position: absolute; left: 12px; top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted); font-size: 13px;
            transition: color 0.25s; pointer-events: none;
        }

        .btn-submit {
            flex-shrink: 0;
            background: linear-gradient(135deg, var(--gold-dark), var(--gold), var(--gold-light));
            color: var(--navy-deep); border: none;
            height: 44px; min-width: 44px; padding: 0 16px;
            border-radius: 12px;
            font-weight: 700; cursor: pointer;
            transition: all 0.25s ease;
            font-size: 13px; font-family: inherit;
            position: relative; overflow: hidden;
            white-space: nowrap;
        }
        .btn-submit::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(110deg, transparent 25%, rgba(255,255,255,0.35) 50%, transparent 75%);
            transform: translateX(-120%);
            transition: transform 0.6s ease;
        }
        .btn-submit:hover::before { transform: translateX(120%); }
        .btn-submit:hover { box-shadow: 0 6px 24px var(--gold-glow); }
        .btn-submit:active { transform: scale(0.96); }
        .btn-submit:disabled {
            background: rgba(255,255,255,0.08); color: var(--text-muted);
            cursor: not-allowed; transform: none; box-shadow: none;
        }
        .btn-submit:disabled::before { display: none; }

        /* ====== DIVIDER ====== */
        .divider {
            flex-shrink: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(212,168,67,0.15), transparent);
            margin: 0 var(--side-pad);
        }

        /* ====== LIST SECTION (fills remaining space) ====== */
        .list-section {
            flex: 1; min-height: 0;
            display: flex; flex-direction: column;
            padding: 12px var(--side-pad) var(--bot-pad);
        }
        .list-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 10px; flex-shrink: 0;
        }
        .list-header h3 { font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.85); letter-spacing: -0.1px; }
        .list-count {
            font-size: 11px; color: var(--gold); font-weight: 600;
            background: var(--gold-subtle);
            padding: 3px 10px; border-radius: 20px;
            border: 1px solid rgba(212,168,67,0.1);
            transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
            white-space: nowrap;
        }

        /* Skeleton */
        .loading { display: flex; flex-direction: column; gap: 8px; }
        .skeleton {
            display: flex; justify-content: space-between; align-items: center;
            padding: 13px 14px; border-radius: 12px;
            background: rgba(255,255,255,0.025);
            animation: skPulse 1.4s ease-in-out infinite;
        }
        .skeleton .ln { height: 10px; border-radius: 5px; background: rgba(255,255,255,0.05); }
        .skeleton .ln.s { width: 72px; }
        .skeleton .ln.l { width: 100px; }
        .skeleton:nth-child(2) { animation-delay: 0.15s; }
        .skeleton:nth-child(3) { animation-delay: 0.3s; }
        @keyframes skPulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }

        /* List */
        .list-wrapper {
            flex: 1; min-height: 0;
            overflow-y: auto;
            display: flex; flex-direction: column; gap: 5px;
            padding-right: 3px;
            -webkit-overflow-scrolling: touch;
        }
        .list-wrapper::-webkit-scrollbar { width: 3px; }
        .list-wrapper::-webkit-scrollbar-track { background: transparent; }
        .list-wrapper::-webkit-scrollbar-thumb { background: rgba(212,168,67,0.15); border-radius: 10px; }
        .list-wrapper::-webkit-scrollbar-thumb:hover { background: rgba(212,168,67,0.3); }

        .list-item {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.025);
            padding: 11px 14px; border-radius: 12px;
            text-decoration: none; color: #fff;
            border: 1px solid rgba(255,255,255,0.02);
            transition: all 0.15s ease;
            animation: itemIn 0.35s cubic-bezier(0.16,1,0.3,1) both;
            flex-shrink: 0;
        }
        .list-item:active {
            background: rgba(212,168,67,0.08);
            border-color: rgba(212,168,67,0.18);
            transform: scale(0.985);
        }
        @keyframes itemIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .list-item .name {
            font-weight: 600; font-size: 13px; color: rgba(255,255,255,0.85);
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
            margin-right: 10px; flex: 1; min-width: 0;
        }
        .list-item .username {
            font-size: 12px; color: var(--gold); font-weight: 600;
            display: flex; align-items: center; gap: 4px;
            white-space: nowrap; flex-shrink: 0;
        }
        .list-item .username i { font-size: 8px; opacity: 0.4; }

        .empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); }
        .empty-state i { font-size: 28px; margin-bottom: 10px; color: rgba(212,168,67,0.12); display: block; }
        .empty-state p { font-size: 13px; line-height: 1.6; }

        /* ====== CREDIT BAR ====== */
        .credit {
            flex-shrink: 0;
            text-align: center; padding: 8px var(--side-pad);
            font-size: 11px; color: var(--text-muted);
            border-top: 1px solid rgba(255,255,255,0.03);
            background: rgba(0,0,0,0.15);
        }
        .credit a { color: var(--gold); text-decoration: none; font-weight: 600; }
        .credit a:active { color: var(--gold-light); }

        /* ====== TOAST ====== */
        .toast {
            position: fixed; top: 14px; left: 50%;
            transform: translateX(-50%) translateY(-120px);
            background: rgba(10,22,40,0.95);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(212,168,67,0.25);
            padding: 10px 18px; border-radius: 12px;
            color: var(--gold-light); font-size: 13px; font-weight: 600;
            font-family: inherit; z-index: 9999;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            transition: transform 0.5s cubic-bezier(0.16,1,0.3,1);
            display: flex; align-items: center; gap: 8px;
            white-space: nowrap;
            max-width: calc(100vw - 28px);
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast i { color: var(--gold); flex-shrink: 0; }

        /* ====== TABLET+ ====== */
        @media (min-width: 520px) {
            :root { --side-pad: max(24px, env(safe-area-inset-left)); }
            .top-section { padding-top: max(20px, env(safe-area-inset-top)); }
            .header { padding-bottom: 18px; }
            .header-row { gap: 18px; }
            .badge { width: 52px; height: 52px; border-radius: 14px; font-size: 24px; }
            .header-text h2 { font-size: 24px; }
            .header-text .subtitle { font-size: 13px; }
            .form-row { padding: 12px 0 18px; gap: 10px; }
            .input-group input { height: 48px; font-size: 15px; border-radius: 14px; }
            .btn-submit { height: 48px; padding: 0 22px; font-size: 14px; border-radius: 14px; }
            .list-section { padding: 14px var(--side-pad) max(16px, env(safe-area-inset-bottom)); }
            .list-header { margin-bottom: 12px; }
            .list-header h3 { font-size: 14px; }
            .list-count { font-size: 12px; padding: 4px 12px; }
            .list-wrapper { gap: 6px; }
            .list-item { padding: 12px 16px; border-radius: 14px; }
            .list-item .name { font-size: 14px; }
            .list-item .username { font-size: 13px; }
            .list-item:hover {
                background: rgba(212,168,67,0.055);
                border-color: rgba(212,168,67,0.15);
                transform: translateX(4px);
            }
            .list-item .username i { opacity: 0; transform: translateX(-6px); transition: all 0.25s ease; }
            .list-item:hover .username i { opacity: 1; transform: translateX(0); }
            .credit { font-size: 12px; padding: 10px var(--side-pad); }
            .toast { padding: 12px 24px; font-size: 14px; border-radius: 14px; top: 20px; }
        }

        @media (min-width: 768px) {
            .app { max-width: 560px; margin: 0 auto; }
        }

        /* ====== TINY SCREENS ====== */
        @media (max-width: 340px) {
            .btn-submit { padding: 0 12px; font-size: 12px; }
            .list-item { padding: 10px 12px; }
            .list-item .name { font-size: 12px; }
            .list-item .username { font-size: 11px; }
        }

        /* ====== KEYBOARD OPEN ====== */
        @media (max-height: 480px) {
            .header-text .subtitle { display: none; }
            .form-row { padding: 6px 0 10px; }
            .list-header { margin-bottom: 6px; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>

    <div class="bg-layer bg-gradient"></div>
    <div class="bg-layer bg-grid"></div>
    <div class="bg-orb bg-orb--1"></div>
    <div class="bg-orb bg-orb--2"></div>
    <canvas id="particles"></canvas>

    <div class="toast" id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastText">Berhasil ditambahkan!</span>
    </div>

    <div class="app">
        <!-- Top: Header + Form -->
        <div class="top-section">
            <header class="header">
                <div class="header-row">
                    <div class="badge"><img src="logo.png" style="width: 1.9rem;" alt=""></div>
                    <div class="header-text">
                        <h2>MABA 26 UNESA</h2>
                        <p class="subtitle">Input akunmu biar otomatis masuk list</p>
                    </div>
                </div>
            </header>

            <form id="igForm">
                <div class="form-row">
                    <div class="input-group">
                        <input type="text" id="inputNama" placeholder="Nama" required autocomplete="off">
                        <i class="fas fa-user icon"></i>
                    </div>
                    <div class="input-group">
                        <input type="text" id="inputUsername" placeholder="Username IG" required autocomplete="off" autocapitalize="off" spellcheck="false">
                        <i class="fab fa-instagram icon"></i>
                    </div>
                    <button type="submit" id="btnSubmit" class="btn-submit">Tambah</button>
                </div>
            </form>
        </div>

        <div class="divider"></div>

        <!-- List: fills all remaining space -->
        <section class="list-section">
            <div class="list-header">
                <h3>Daftar Akun Saat Ini</h3>
                <span class="list-count" id="listCount">0 orang</span>
            </div>
            <div id="loader" class="loading">
                <div class="skeleton"><span class="ln l"></span><span class="ln s"></span></div>
                <div class="skeleton"><span class="ln l"></span><span class="ln s"></span></div>
                <div class="skeleton"><span class="ln l"></span><span class="ln s"></span></div>
            </div>
            <div id="listContainer" class="list-wrapper"></div>
        </section>

        <footer class="credit">
            Developer: <a href="https://www.instagram.com/aftharmuhammad_/" target="_blank" rel="noopener noreferrer">@aftharmuhammad_</a>
        </footer>
    </div>

    <script>
        /* ========================================
           PARTICLE SYSTEM
           ======================================== */
        (function () {
            var cvs = document.getElementById('particles');
            var ctx = cvs.getContext('2d');
            var particles = [];

            function resize() { cvs.width = window.innerWidth; cvs.height = window.innerHeight; }
            resize();
            window.addEventListener('resize', resize);

            function getCount() {
                var w = window.innerWidth;
                if (w < 360) return 10;
                if (w < 480) return 18;
                if (w < 768) return 30;
                return 45;
            }

            function Dot(ry) { this.reset(ry); }
            Dot.prototype.reset = function (ry) {
                this.x = Math.random() * cvs.width;
                this.y = ry ? Math.random() * cvs.height : cvs.height + 10;
                this.r = Math.random() * 1.4 + 0.3;
                this.vy = -(Math.random() * 0.28 + 0.05);
                this.vx = (Math.random() - 0.5) * 0.12;
                this.alpha = Math.random() * 0.35 + 0.05;
                this.wA = Math.random() * 0.25 + 0.06;
                this.wS = Math.random() * 0.01 + 0.004;
                this.ph = Math.random() * Math.PI * 2;
            };
            Dot.prototype.update = function () {
                this.y += this.vy;
                this.ph += this.wS;
                this.x += Math.sin(this.ph) * this.wA + this.vx;
                if (this.y < -10) this.reset(false);
            };
            Dot.prototype.draw = function () {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(212,168,67,' + this.alpha + ')';
                ctx.fill();
            };

            var count = getCount();
            for (var i = 0; i < count; i++) particles.push(new Dot(true));
            var lastCount = count;
            window.addEventListener('resize', function () {
                count = getCount();
                if (count !== lastCount) {
                    particles = [];
                    for (var i = 0; i < count; i++) particles.push(new Dot(true));
                    lastCount = count;
                }
            });

            (function loop() {
                ctx.clearRect(0, 0, cvs.width, cvs.height);
                for (var i = 0; i < particles.length; i++) { particles[i].update(); particles[i].draw(); }
                requestAnimationFrame(loop);
            })();
        })();

        /* ========================================
           TOAST
           ======================================== */
        var toastTimer;
        function showToast(text) {
            var t = document.getElementById('toast');
            document.getElementById('toastText').textContent = text;
            t.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(function () { t.classList.remove('show'); }, 3000);
        }

        /* ========================================
           BACKEND LOGIC — TIDAK DIUBAH
           ======================================== */
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw-amx21RJKIrDUy4E1pKkUIYRt05q5c9UEa_brx33W4VximZgTHA2-uJ2iNYy2gzCf/exec";

        const form = document.getElementById('igForm');
        const btnSubmit = document.getElementById('btnSubmit');
        const listContainer = document.getElementById('listContainer');
        const loader = document.getElementById('loader');
        const listCount = document.getElementById('listCount');

        function muatDaftar() {
            loader.style.display = "flex";
            listContainer.innerHTML = "";

            fetch(WEB_APP_URL)
                .then(res => res.json())
                .then(data => {
                    loader.style.display = "none";

                    listCount.textContent = data.length + ' orang';
                    listCount.style.transform = 'scale(1.25)';
                    setTimeout(function () { listCount.style.transform = 'scale(1)'; }, 220);

                    if (data.length === 0) {
                        listContainer.innerHTML =
                            '<div class="empty-state">' +
                            '<i class="fas fa-user-plus"></i>' +
                            '<p>Belum ada yang ngelist.<br>Jadi yang pertama!</p>' +
                            '</div>';
                        return;
                    }

                    data.forEach(function (user, i) {
                        var item = document.createElement('a');
                        item.href = 'https://instagram.com/' + user[1];
                        item.target = '_blank';
                        item.rel = 'noopener noreferrer';
                        item.className = 'list-item';
                        item.style.animationDelay = (i * 0.03) + 's';
                        item.innerHTML =
                            '<span class="name">' + user[0] + '</span>' +
                            '<span class="username">@' + user[1] + ' <i class="fas fa-arrow-up-right-from-square"></i></span>';
                        listContainer.appendChild(item);
                    });
                })
                .catch(function (err) {
                    loader.innerHTML =
                        '<div class="empty-state">' +
                        '<i class="fas fa-triangle-exclamation"></i>' +
                        '<p>Gagal memuat data</p>' +
                        '</div>';
                    console.error(err);
                });
        }

        form.addEventListener('submit', function (e) {
            e.preventDefault();

            var nama = document.getElementById('inputNama').value;
            var username = document.getElementById('inputUsername').value;

            btnSubmit.innerText = "...";
            btnSubmit.disabled = true;

            var urlKirim = WEB_APP_URL + '?action=add&nama=' + encodeURIComponent(nama) + '&username=' + encodeURIComponent(username);

            fetch(urlKirim)
                .then(res => res.json())
                .then(result => {
                    btnSubmit.innerText = "Tambah";
                    btnSubmit.disabled = false;

                    if (result.status === "success") {
                        form.reset();
                        showToast('Berhasil ditambahkan!');
                        muatDaftar();
                    } else {
                        alert("Gagal menambahkan data: " + result.message);
                    }
                })
                .catch(function (err) {
                    alert("Terjadi kesalahan jaringan.");
                    btnSubmit.innerText = "Tambah";
                    btnSubmit.disabled = false;
                    console.error(err);
                });
        });

        muatDaftar();
