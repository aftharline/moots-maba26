<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Squad IG — MABA UNESA 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --navy-deep: #060D1F;
            --navy-dark: #0A1628;
            --navy-mid: #0F2557;
            --navy-light: #1B3A6B;
            --gold-dark: #A68A3E;
            --gold: #C9A84C;
            --gold-bright: #E8C547;
            --gold-glow: #FFD700;
            --white: #FFFFFF;
            --white-soft: #E8EAF0;
            --white-muted: #8892A8;
            --black: #000000;
            --card-bg: rgba(15, 37, 87, 0.25);
            --card-border: rgba(201, 168, 76, 0.12);
            --glass-bg: rgba(10, 22, 40, 0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--navy-deep);
            min-height: 100vh;
            color: var(--white);
            overflow-x: hidden;
            position: relative;
        }

        /* === ANIMATED BACKGROUND === */
        .bg-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }
        .bg-layer::before {
            content: '';
            position: absolute;
            width: 600px; height: 600px;
            top: -150px; right: -150px;
            background: radial-gradient(circle, rgba(201,168,76,0.12) 0%, transparent 70%);
            animation: floatOrb1 12s ease-in-out infinite;
        }
        .bg-layer::after {
            content: '';
            position: absolute;
            width: 500px; height: 500px;
            bottom: -100px; left: -100px;
            background: radial-gradient(circle, rgba(15,37,87,0.5) 0%, transparent 70%);
            animation: floatOrb2 15s ease-in-out infinite;
        }
        .bg-orb-3 {
            position: absolute;
            width: 300px; height: 300px;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(232,197,71,0.06) 0%, transparent 70%);
            animation: floatOrb3 10s ease-in-out infinite;
        }
        .bg-grid {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(201,168,76,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(201,168,76,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        @keyframes floatOrb1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-40px, 30px) scale(1.15); }
        }
        @keyframes floatOrb2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -40px) scale(1.1); }
        }
        @keyframes floatOrb3 {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            50% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
        }

        /* === PARTICLES === */
        .particles {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }
        .particle {
            position: absolute;
            width: 2px; height: 2px;
            background: var(--gold);
            border-radius: 50%;
            opacity: 0;
            animation: sparkle var(--dur) var(--delay) infinite;
        }
        @keyframes sparkle {
            0%, 100% { opacity: 0; transform: translateY(0) scale(0.5); }
            50% { opacity: var(--op); transform: translateY(-30px) scale(1); }
        }

        /* === MAIN LAYOUT === */
        .main-wrapper {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px 16px 40px;
            max-width: 520px;
            margin: 0 auto;
        }

        /* === DEVELOPER CREDIT === */
        .dev-credit {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 0;
            margin-bottom: 8px;
            animation: fadeSlideDown 0.6s ease-out;
        }
        .dev-credit a {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            color: var(--white-muted);
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.5px;
            padding: 6px 14px;
            border-radius: 100px;
            border: 1px solid rgba(201,168,76,0.1);
            background: rgba(201,168,76,0.04);
            transition: all 0.3s ease;
        }
        .dev-credit a:hover {
            color: var(--gold-bright);
            border-color: rgba(201,168,76,0.3);
            background: rgba(201,168,76,0.08);
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(201,168,76,0.1);
        }
        .dev-credit a i {
            font-size: 13px;
            color: var(--gold);
            transition: color 0.3s;
        }
        .dev-credit a:hover i { color: var(--gold-glow); }

        /* === HEADER === */
        .header {
            text-align: center;
            padding: 24px 0 8px;
            animation: fadeSlideDown 0.7s ease-out 0.1s both;
        }
        .logo-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 64px; height: 64px;
            border-radius: 20px;
            background: linear-gradient(135deg, var(--navy-mid), var(--navy-light));
            border: 1.5px solid rgba(201,168,76,0.2);
            margin-bottom: 18px;
            position: relative;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.05);
        }
        .logo-badge::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 24px;
            background: linear-gradient(135deg, rgba(201,168,76,0.2), transparent, rgba(201,168,76,0.1));
            z-index: -1;
        }
        .logo-badge i {
            font-size: 26px;
            background: linear-gradient(135deg, var(--gold-bright), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header h1 {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.5px;
            line-height: 1.2;
            margin-bottom: 6px;
        }
        .header h1 .gold-text {
            background: linear-gradient(135deg, var(--gold-bright), var(--gold), var(--gold-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header .year-badge {
            display: inline-block;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: var(--navy-deep);
            font-size: 11px;
            font-weight: 800;
            padding: 3px 12px;
            border-radius: 100px;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
        }
        .header p {
            color: var(--white-muted);
            font-size: 13px;
            font-weight: 400;
            line-height: 1.5;
        }

        /* === CARD === */
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 28px 22px;
            margin-top: 24px;
            position: relative;
            overflow: hidden;
            animation: fadeSlideUp 0.7s ease-out 0.2s both;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(201,168,76,0.3), transparent);
        }

        .card-form {
            animation: fadeSlideUp 0.7s ease-out 0.25s both;
        }

        .section-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 700;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 18px;
        }
        .section-label i {
            font-size: 14px;
        }
        .section-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, rgba(201,168,76,0.2), transparent);
        }

        /* === FORM === */
        .form-group {
            position: relative;
            margin-bottom: 14px;
        }
        .form-group i.field-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            color: var(--white-muted);
            transition: color 0.3s;
            z-index: 2;
        }
        .form-group input {
            width: 100%;
            background: rgba(255,255,255,0.04);
            border: 1.5px solid rgba(255,255,255,0.08);
            padding: 15px 16px 15px 44px;
            border-radius: 14px;
            color: var(--white);
            font-size: 14px;
            font-family: inherit;
            font-weight: 500;
            outline: none;
            transition: all 0.3s ease;
        }
        .form-group input::placeholder {
            color: rgba(255,255,255,0.25);
            font-weight: 400;
        }
        .form-group input:focus {
            border-color: var(--gold);
            background: rgba(201,168,76,0.05);
            box-shadow: 0 0 0 4px rgba(201,168,76,0.08);
        }
        .form-group input:focus + i.field-icon,
        .form-group input:focus ~ i.field-icon {
            color: var(--gold);
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-family: inherit;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, var(--gold-bright), var(--gold), var(--gold-dark));
            color: var(--navy-deep);
            letter-spacing: 0.3px;
            transition: all 0.3s ease;
            margin-top: 4px;
        }
        .btn-submit::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(201,168,76,0.35);
        }
        .btn-submit:hover::before { opacity: 1; }
        .btn-submit:active { transform: translateY(0); }
        .btn-submit:disabled {
            background: rgba(255,255,255,0.08);
            color: var(--white-muted);
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }
        .btn-submit:disabled::before { display: none; }
        .btn-submit .btn-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            position: relative;
            z-index: 1;
        }

        /* === DIVIDER === */
        .divider-area {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 28px 0;
            animation: fadeSlideUp 0.7s ease-out 0.35s both;
        }
        .divider-area::before, .divider-area::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(201,168,76,0.15), transparent);
        }
        .divider-area span {
            font-size: 11px;
            color: var(--white-muted);
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            white-space: nowrap;
        }

        /* === LIST CARD === */
        .card-list {
            animation: fadeSlideUp 0.7s ease-out 0.4s both;
        }

        .list-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        .list-header .section-label { margin-bottom: 0; }

        .member-count {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(201,168,76,0.1);
            border: 1px solid rgba(201,168,76,0.15);
            color: var(--gold);
            font-size: 12px;
            font-weight: 700;
            padding: 5px 12px;
            border-radius: 100px;
        }
        .member-count .dot {
            width: 6px; height: 6px;
            background: #4ADE80;
            border-radius: 50%;
            animation: pulse-dot 2s infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(74,222,128,0.4); }
            50% { opacity: 0.7; box-shadow: 0 0 0 4px rgba(74,222,128,0); }
        }

        .search-box {
            position: relative;
            margin-bottom: 14px;
        }
        .search-box i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 13px;
            color: var(--white-muted);
        }
        .search-box input {
            width: 100%;
            background: rgba(255,255,255,0.04);
            border: 1.5px solid rgba(255,255,255,0.06);
            padding: 12px 14px 12px 40px;
            border-radius: 12px;
            color: var(--white);
            font-size: 13px;
            font-family: inherit;
            font-weight: 500;
            outline: none;
            transition: all 0.3s ease;
        }
        .search-box input::placeholder { color: rgba(255,255,255,0.2); }
        .search-box input:focus {
            border-color: rgba(201,168,76,0.3);
            background: rgba(201,168,76,0.03);
        }

        /* === LIST ITEMS === */
        .list-wrapper {
            max-height: 380px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding-right: 4px;
        }
        .list-wrapper::-webkit-scrollbar { width: 3px; }
        .list-wrapper::-webkit-scrollbar-track { background: transparent; }
        .list-wrapper::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.2); border-radius: 10px; }

        .list-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 14px;
            border-radius: 14px;
            text-decoration: none;
            color: var(--white);
            background: rgba(255,255,255,0.02);
            border: 1px solid transparent;
            transition: all 0.25s ease;
            animation: itemSlideIn 0.4s ease-out both;
        }
        .list-item:hover {
            background: rgba(201,168,76,0.06);
            border-color: rgba(201,168,76,0.12);
            transform: translateX(4px);
        }
        .list-item:active { transform: scale(0.98); }

        .item-avatar {
            width: 40px; height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            font-weight: 800;
            flex-shrink: 0;
            color: var(--navy-deep);
            position: relative;
        }
        .item-avatar::after {
            content: '';
            position: absolute;
            bottom: -1px; right: -1px;
            width: 10px; height: 10px;
            background: #4ADE80;
            border: 2px solid var(--navy-dark);
            border-radius: 50%;
        }

        .item-info { flex: 1; min-width: 0; }
        .item-info .name {
            font-size: 14px;
            font-weight: 600;
            line-height: 1.3;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .item-info .username {
            font-size: 12px;
            color: var(--gold);
            font-weight: 500;
        }

        .item-arrow {
            color: rgba(255,255,255,0.15);
            font-size: 12px;
            transition: all 0.25s;
            flex-shrink: 0;
        }
        .list-item:hover .item-arrow {
            color: var(--gold);
            transform: translateX(2px);
        }

        @keyframes itemSlideIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .empty-state {
            text-align: center;
            padding: 36px 20px;
        }
        .empty-state i {
            font-size: 36px;
            color: rgba(201,168,76,0.15);
            margin-bottom: 12px;
        }
        .empty-state p {
            color: var(--white-muted);
            font-size: 13px;
            line-height: 1.5;
        }

        .loading-state {
            text-align: center;
            padding: 30px;
        }
        .loading-spinner {
            width: 28px; height: 28px;
            border: 2.5px solid rgba(201,168,76,0.15);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-state p { color: var(--white-muted); font-size: 13px; }

        /* === TOAST === */
        .toast-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }
        .toast {
            background: rgba(10,22,40,0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(201,168,76,0.2);
            color: var(--white);
            padding: 14px 22px;
            border-radius: 14px;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            animation: toastIn 0.4s ease-out;
            pointer-events: auto;
            white-space: nowrap;
        }
        .toast.success i { color: #4ADE80; }
        .toast.error i { color: #F87171; }
        .toast.removing { animation: toastOut 0.3s ease-in forwards; }

        @keyframes toastIn {
            from { opacity: 0; transform: translateY(-20px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes toastOut {
            to { opacity: 0; transform: translateY(-20px) scale(0.9); }
        }

        /* === FOOTER === */
        .footer {
            text-align: center;
            padding: 28px 0 8px;
            animation: fadeSlideUp 0.7s ease-out 0.5s both;
        }
        .footer p {
            font-size: 11px;
            color: rgba(255,255,255,0.15);
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        .footer .unesa-text {
            color: rgba(201,168,76,0.3);
            font-weight: 700;
        }

        /* === ANIMATIONS === */
        @keyframes fadeSlideDown {
            from { opacity: 0; transform: translateY(-15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* === NO RESULTS === */
        .no-results {
            text-align: center;
            padding: 24px 16px;
            color: var(--white-muted);
            font-size: 13px;
        }
        .no-results i {
            font-size: 28px;
            color: rgba(255,255,255,0.08);
            margin-bottom: 8px;
            display: block;
        }

        /* === RESPONSIVE === */
        @media (min-width: 420px) {
            .main-wrapper { padding: 28px 24px 48px; }
            .card { padding: 32px 28px; }
            .header h1 { font-size: 30px; }
        }
        @media (min-width: 768px) {
            .main-wrapper { padding: 40px 32px 56px; }
            .card { padding: 36px 32px; border-radius: 28px; }
            .header h1 { font-size: 34px; }
            .list-wrapper { max-height: 450px; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>

    <!-- Background Layer -->
    <div class="bg-layer">
        <div class="bg-grid"></div>
        <div class="bg-orb-3"></div>
    </div>

    <!-- Particles -->
    <div class="particles" id="particles"></div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Main Content -->
    <div class="main-wrapper">

        <!-- Developer Credit -->
        <div class="dev-credit">
            <a href="https://www.instagram.com/aftharmuhammad_/" target="_blank" rel="noopener noreferrer">
                <i class="fa-brands fa-instagram"></i>
                <span>Developed by aftharmuhammad_</span>
            </a>
        </div>

        <!-- Header -->
        <header class="header">
            <div class="logo-badge">
                <img src="logo.webp" style="width: 3rem;" alt="">
            </div>
            <h1>MABA <span class="gold-text">UNESA</span></h1>
            <div class="year-badge">ANGKATAN 2026</div>
            <p>Daftarin akun Instagram-mu, ayo saling follow buat nambah teman sebanyak-banyaknya!</p>
        </header>

        <!-- Form Card -->
        <div class="card card-form">
            <div class="section-label">
                <i class="fa-solid fa-plus"></i>
                Tambah Akun
            </div>
            <form id="igForm">
                <div class="form-group">
                    <input type="text" id="inputNama" placeholder="Nama Lengkap / Panggilan" required autocomplete="off">
                    <i class="fa-solid fa-user field-icon"></i>
                </div>
                <div class="form-group">
                    <input type="text" id="inputUsername" placeholder="Username IG (tanpa @)" required autocomplete="off">
                    <i class="fa-brands fa-instagram field-icon"></i>
                </div>
                <button type="submit" id="btnSubmit" class="btn-submit">
                    <span class="btn-content">
                        <i class="fa-solid fa-paper-plane"></i>
                        <span id="btnText">Tambahkan Saya</span>
                    </span>
                </button>
            </form>
        </div>

        <!-- Divider -->
        <div class="divider-area">
            <span>Squad List</span>
        </div>

        <!-- List Card -->
        <div class="card card-list">
            <div class="list-header">
                <div class="section-label">
                    <i class="fa-solid fa-list"></i>
                    Daftar Anggota
                </div>
                <div class="member-count">
                    <span class="dot"></span>
                    <span id="countText">0 orang</span>
                </div>
            </div>

            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchInput" placeholder="Cari nama atau username..." autocomplete="off">
            </div>

            <div id="loader" class="loading-state">
                <div class="loading-spinner"></div>
                <p>Memuat data secara live...</p>
            </div>
            <div id="listContainer" class="list-wrapper" style="display:none;"></div>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p><span class="unesa-text">UNESA</span> — Universitas Negeri Surabaya</p>
        </footer>
    </div>

    <!-- Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAZP7dJ2sqNFzGYV9VY_rN2TslXHQn1o3s",
            authDomain: "squad-ig-list.firebaseapp.com",
            projectId: "squad-ig-list",
            storageBucket: "squad-ig-list.firebasestorage.app",
            messagingSenderId: "129040094336",
            appId: "1:129040094336:web:6d8ac546506b5b0d038265"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const listCollection = collection(db, "instagram_list");

        const form = document.getElementById('igForm');
        const btnSubmit = document.getElementById('btnSubmit');
        const btnText = document.getElementById('btnText');
        const listContainer = document.getElementById('listContainer');
        const loader = document.getElementById('loader');
        const countText = document.getElementById('countText');
        const searchInput = document.getElementById('searchInput');

        // Warna avatar berdasarkan index
        const avatarColors = [
            'linear-gradient(135deg, #C9A84C, #A68A3E)',
            'linear-gradient(135deg, #E8C547, #C9A84C)',
            'linear-gradient(135deg, #1B3A6B, #0F2557)',
            'linear-gradient(135deg, #2D5A9E, #1B3A6B)',
            'linear-gradient(135deg, #D4AF37, #B8942E)',
            'linear-gradient(135deg, #3A6FC4, #2D5A9E)',
            'linear-gradient(135deg, #FFD700, #C9A84C)',
            'linear-gradient(135deg, #4A7FD4, #3A6FC4)',
        ];

        // Simpan semua data untuk search
        let allData = [];

        function getInitials(nama) {
            const parts = nama.trim().split(/\s+/);
            if (parts.length >= 2) return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
            return nama.trim().substring(0, 2).toUpperCase();
        }

        function renderList(filter = '') {
            listContainer.innerHTML = '';
            const filtered = filter
                ? allData.filter(d =>
                    d.nama.toLowerCase().includes(filter) ||
                    d.username.toLowerCase().includes(filter)
                )
                : allData;

            if (filtered.length === 0 && filter) {
                listContainer.innerHTML = `
                    <div class="no-results">
                        <i class="fa-solid fa-face-meh"></i>
                        Tidak ditemukan untuk "<strong>${filter}</strong>"
                    </div>`;
                return;
            }

            filtered.forEach((data, i) => {
                const item = document.createElement('a');
                item.href = `https://instagram.com/${data.username}`;
                item.target = "_blank";
                item.rel = "noopener noreferrer";
                item.className = 'list-item';
                item.style.animationDelay = `${i * 0.04}s`;

                const colorIdx = i % avatarColors.length;
                const initials = getInitials(data.nama);

                item.innerHTML = `
                    <div class="item-avatar" style="background: ${avatarColors[colorIdx]}">
                        ${initials}
                    </div>
                    <div class="item-info">
                        <div class="name">${escapeHtml(data.nama)}</div>
                        <div class="username">@${escapeHtml(data.username)}</div>
                    </div>
                    <div class="item-arrow">
                        <i class="fa-solid fa-arrow-up-right-from-square"></i>
                    </div>
                `;
                listContainer.appendChild(item);
            });
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icon = type === 'success' ? 'fa-circle-check' : 'fa-circle-xmark';
            toast.innerHTML = `<i class="fa-solid ${icon}"></i><span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('removing');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Real-time listener
        const q = query(listCollection, orderBy("waktuInput", "desc"));
        onSnapshot(q, (snapshot) => {
            loader.style.display = "none";
            listContainer.style.display = "flex";

            allData = [];
            snapshot.forEach((doc) => {
                allData.push(doc.data());
            });

            countText.textContent = `${allData.length} orang`;
            renderList(searchInput.value.toLowerCase().trim());
        }, (error) => {
            console.error("Error mengambil data:", error);
            loader.innerHTML = `<p style="color:#F87171;">Gagal memuat data.</p>`;
        });

        // Search
        searchInput.addEventListener('input', (e) => {
            renderList(e.target.value.toLowerCase().trim());
        });

        // Submit form
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const nama = document.getElementById('inputNama').value.trim();
            let username = document.getElementById('inputUsername').value.replace('@', '').trim();

            if (!nama || !username) return;

            btnText.textContent = 'Mengirim...';
            btnSubmit.disabled = true;

            try {
                await addDoc(listCollection, {
                    nama: nama,
                    username: username,
                    waktuInput: serverTimestamp()
                });
                form.reset();
                showToast(`${nama} berhasil ditambahkan!`, 'success');
            } catch (error) {
                console.error("Gagal menambahkan data:", error);
                showToast('Gagal mengirim. Coba lagi!', 'error');
            } finally {
                btnText.textContent = 'Tambahkan Saya';
                btnSubmit.disabled = false;
            }
        });
    </script>

    <!-- Particles Generator -->
    <script>
        (function() {
            const container = document.getElementById('particles');
            const count = 25;
            for (let i = 0; i < count; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.top = Math.random() * 100 + '%';
                p.style.setProperty('--dur', (4 + Math.random() * 6) + 's');
                p.style.setProperty('--delay', (Math.random() * 5) + 's');
                p.style.setProperty('--op', (0.15 + Math.random() * 0.35).toString());
                if (Math.random() > 0.7) {
                    p.style.width = '3px';
                    p.style.height = '3px';
                }
                container.appendChild(p);
            }
        })();
    </script>
</body>
</html>
